data_paths:
  raw_data: "data/raw/ai4i2020.csv"
  processed_data: "data/processed/ai4i2020_processed.csv"

random_seed: 42
train_test_split_ratio: 0.2

hyperparameters:
  RandomForest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
  XGBoost:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
